name: Build ESP-Drone Firmware & Cross-Platform Client

on:
  workflow_dispatch:
    inputs:
      board:
        description: 'Target chip'
        required: true
        default: 'esp32'
        type: choice
        options:
          - esp32
          - esp32s2
          - esp32s3
      custom_pins:
        description: |
          Custom pin assignments (key=value, one per line)
          Example:
          CONFIG_MPU6050_SCL=10
          CONFIG_MPU6050_SDA=11
          CONFIG_MOTOR1_PIN=5
          CONFIG_LED_BLUE_PIN=7
          CONFIG_CAM_VSYNC=13
        required: false
        default: ''
      phy_power_boost:
        description: 'Set WiFi TX power to 20dBm (higher power, faster battery drain)'
        required: true
        default: true
        type: boolean
      release_tag:
        description: 'Release tag (leave empty for auto-generate)'
        required: false
        default: ''
      create_release:
        description: 'Create a GitHub Release and upload artifacts'
        required: true
        default: true
        type: boolean

env:
  IDF_VERSION: v5.0.4

jobs:
  # ========== 1. 编译固件 (Ubuntu) ==========
  build_firmware:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.prepare_tag.outputs.tag }}
      fw_artifact_path: ${{ steps.package_fw.outputs.fw_artifact_path }}
    steps:
      - name: Checkout firmware repository
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build with ESP-IDF
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: ${{ env.IDF_VERSION }}
          target: ${{ inputs.board }}
          path: .
          command: |
            # 修改链接脚本
            BOARD_SHORT="${{ inputs.board }}"
            case "$BOARD_SHORT" in
              esp32) LD_FILE="$IDF_PATH/components/esp32/ld/esp32.project.ld.in" ;;
              esp32s2) LD_FILE="$IDF_PATH/components/esp32s2/ld/esp32s2.project.ld.in" ;;
              esp32s3) LD_FILE="$IDF_PATH/components/esp32s3/ld/esp32s3.project.ld.in" ;;
            esac
            if [ -f "$LD_FILE" ] && ! grep -q "_param_start" "$LD_FILE"; then
              sudo sed -i '/^SECTIONS$/a\
              /* Parameters and log system datas */\
              _param_start = .;\
              KEEP(*(.param))\
              KEEP(*(.param.*))\
              _param_stop = .;\
              . = ALIGN(4);\
              _log_start = .;\
              KEEP(*(.log))\
              KEEP(*(.log.*))\
              _log_stop = .;\
              . = ALIGN(4);' "$LD_FILE"
            fi
            # 自定义引脚
            if [ -n "${{ inputs.custom_pins }}" ]; then
              echo "${{ inputs.custom_pins }}" >> sdkconfig
              idf.py reconfigure
            fi
            # 提高 PHY 增益
            if [ "${{ inputs.phy_power_boost }}" == "true" ]; then
              echo "CONFIG_ESP32_PHY_MAX_TX_POWER=20" >> sdkconfig
              idf.py reconfigure
            fi
            idf.py build

      - name: Prepare tag
        id: prepare_tag
        run: |
          TAG="${{ inputs.release_tag }}"
          if [ -z "$TAG" ]; then
            TAG="manual-$(date +'%Y%m%d-%H%M%S')"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "TAG=$TAG" >> $GITHUB_ENV

      - name: Package firmware
        id: package_fw
        run: |
          BOARD="${{ inputs.board }}"
          TAG="${{ env.TAG }}"
          FW_ARTIFACT="esp-drone-firmware-${BOARD}-${TAG}.zip"
          mkdir -p fw_artifacts
          cp build/*.bin fw_artifacts/ 2>/dev/null || true
          cp build/bootloader/*.bin fw_artifacts/ 2>/dev/null || true
          cp build/partition_table/*.bin fw_artifacts/ 2>/dev/null || true
          zip -j "$FW_ARTIFACT" fw_artifacts/*.bin
          echo "fw_artifact_path=$(realpath $FW_ARTIFACT)" >> $GITHUB_OUTPUT

      - name: Upload firmware artifact (temporary)
        uses: actions/upload-artifact@v4
        with:
          name: firmware_${{ env.TAG }}
          path: ${{ steps.package_fw.outputs.fw_artifact_path }}
          if-no-files-found: error

  # ========== 2. 打包跨平台客户端 (矩阵) ==========
  build_client:
    runs-on: ${{ matrix.os }}
    needs: build_firmware   # 仅为了获取 tag，但也可独立运行
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            pyinstaller_opts: --onefile --name cfclient --add-data "cfclient/bin:bin" --add-data "cfclient/lib:lib"
            # 实际上需要更详细的 spec，这里简化：使用目录方式打包
          - os: macos-latest
            platform: macos
          - os: windows-latest
            platform: windows
    steps:
      - name: Checkout cfclient repository
        uses: actions/checkout@v4
        with:
          repository: qljz1993/crazyflie-clients-python
          ref: dev_esplane
          path: cfclient
          submodules: 'recursive'

      - name: Checkout crazyflie-lib-python (CRTP)
        uses: actions/checkout@v4
        with:
          repository: qljz1993/crazyflie-lib-python
          ref: dev_esplane
          path: crazyflie-lib-python

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pyqt5 python3-pyqt5.qtsvg libgl1-mesa-glx
          pip install pyinstaller

      - name: Install dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew install pyqt5
          pip3 install pyinstaller

      - name: Install dependencies (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          pip install pyqt5 pyinstaller

      - name: Install Python packages
        run: |
          pip install -e ./crazyflie-lib-python
          pip install -r ./cfclient/requirements.txt
          pip install pyinstaller

      - name: Build executable with PyInstaller (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          cd cfclient
          # 创建 spec 文件并打包为单文件
          pyinstaller --onefile --name cfclient \
            --add-data "bin:bin" \
            --add-data "lib:lib" \
            --add-data "src:src" \
            --hidden-import PyQt5.sip \
            bin/cfclient
          # 打包为 zip
          cd dist
          zip -r cfclient-linux-amd64.zip cfclient
          echo "artifact_path=$(pwd)/cfclient-linux-amd64.zip" >> $GITHUB_OUTPUT

      - name: Build executable with PyInstaller (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          cd cfclient
          pyinstaller --onefile --windowed --name cfclient \
            --add-data "bin:bin" \
            --add-data "lib:lib" \
            --add-data "src:src" \
            --hidden-import PyQt5.sip \
            bin/cfclient
          cd dist
          zip -r cfclient-macos.zip cfclient.app
          echo "artifact_path=$(pwd)/cfclient-macos.zip" >> $GITHUB_OUTPUT

      - name: Build executable with PyInstaller (Windows)
        if: matrix.os == 'windows-latest'
        shell: cmd
        run: |
          cd cfclient
          pyinstaller --onefile --name cfclient.exe --add-data "bin;bin" --add-data "lib;lib" --add-data "src;src" --hidden-import PyQt5.sip bin\cfclient
          cd dist
          powershell Compress-Archive -Path cfclient.exe -DestinationPath cfclient-windows.zip
          echo "artifact_path=%cd%\cfclient-windows.zip" >> %GITHUB_OUTPUT%

      - name: Upload client artifact (temporary)
        uses: actions/upload-artifact@v4
        with:
          name: cfclient_${{ matrix.platform }}_${{ needs.build_firmware.outputs.tag }}
          path: ${{ steps.build.outputs.artifact_path }}
          if-no-files-found: error

  # ========== 3. 发布到 Release ==========
  release:
    runs-on: ubuntu-latest
    needs: [build_firmware, build_client]
    if: inputs.create_release == true
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: ls -R artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.build_firmware.outputs.tag }}
          name: "ESP-Drone Release ${{ needs.build_firmware.outputs.tag }}"
          body: |
            ## Firmware
            - Chip: ${{ inputs.board }}
            - Custom pins: ${{ inputs.custom_pins || 'default' }}
            - WiFi TX power: ${{ inputs.phy_power_boost && '20dBm' || 'default' }}
            
            ## PC Client Downloads
            - **Linux**: cfclient_linux_*.zip
            - **macOS**: cfclient_macos_*.zip
            - **Windows**: cfclient_windows_*.zip
            
            ## How to Use
            - **Flash firmware**: Use ESP-IDF toolchain or `esptool.py`.
            - **Run client**: Extract the zip for your OS and run the executable.
          files: |
            artifacts/firmware_*/esp-drone-firmware-*.zip
            artifacts/cfclient_linux_*/cfclient-linux-*.zip
            artifacts/cfclient_macos_*/cfclient-macos-*.zip
            artifacts/cfclient_windows_*/cfclient-windows-*.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
