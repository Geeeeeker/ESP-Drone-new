name: Pull Docker Images and Upload to Release (7z Split)

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (leave empty for auto-generate)'
        required: false
        default: ''
      create_release:
        description: 'Create a GitHub Release and upload artifacts'
        required: true
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  pull-and-upload:
    runs-on: ubuntu-latest
    steps:
      - name: Install 7-Zip
        run: sudo apt-get update && sudo apt-get install -y p7zip-full

      - name: Prepare directories
        run: mkdir -p images

      - name: Pull and save images
        id: pull_images
        run: |
          declare -A images=(
            ["ubuntu:18.04"]="ubuntu_18.04.tar"
            ["catthehacker/ubuntu:act-18.04"]="catthehacker_ubuntu_act-18.04.tar"
          )
          successful_images=()
          for img in "${!images[@]}"; do
            echo "Attempting to pull $img ..."
            if docker pull "$img"; then
              echo "Pull successful for $img"
              outfile="${images[$img]}"
              echo "Saving to $outfile ..."
              docker save "$img" -o "images/$outfile"
              successful_images+=("$img")
            else
              echo "Pull failed for $img, skipping."
            fi
          done
          if [ ${#successful_images[@]} -eq 0 ]; then
            echo "No images were successfully pulled. Exiting."
            exit 1
          fi
          echo "successful_images=${successful_images[@]}" >> $GITHUB_OUTPUT

      - name: Compress and split images with 7z
        run: |
          cd images
          for tarfile in *.tar; do
            # 使用 7z 压缩并分卷为 1023MB（GitHub Release 单文件限制 2GB，这里使用 1023MB 保险）
            7z a -v1023m "${tarfile}.7z" "$tarfile"
            rm "$tarfile"
          done
          cd ..

      - name: Prepare tag and release name
        id: release_info
        run: |
          TAG="${{ inputs.release_tag }}"
          if [ -z "$TAG" ]; then
            TAG="docker-images-$(date +'%Y%m%d-%H%M%S')"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "name=Docker Images ($TAG)" >> $GITHUB_OUTPUT

      - name: Create GitHub Release and upload assets
        if: inputs.create_release == true
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_info.outputs.tag }}
          name: ${{ steps.release_info.outputs.name }}
          body: |
            This release contains Docker images successfully pulled from Docker Hub.

            **Images included:**
            ${{ steps.pull_images.outputs.successful_images }}

            Each image is saved as a `.tar.7z.001`, `.002`, etc. (split compressed archive using 7-Zip).

            To reconstruct and load an image:
            ```bash
            # Download all parts to the same directory
            # Combine and decompress
            7z x ubuntu_18.04.tar.7z.001
            docker load -i ubuntu_18.04.tar
