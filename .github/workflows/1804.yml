name: Pull and Upload Ubuntu 18.04 Docker Image (7z split)

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag'
        required: false
        default: 'ubuntu-18.04-docker'

permissions:
  contents: write

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Install 7z
        run: sudo apt-get update && sudo apt-get install -y p7zip-full

      - name: Pull Ubuntu 18.04
        run: docker pull ubuntu:18.04

      - name: Save, gzip, and split
        run: |
          docker save ubuntu:18.04 -o ubuntu_18.04.tar
          gzip ubuntu_18.04.tar
          7z a -v1023m ubuntu_18.04.tar.7z ubuntu_18.04.tar.gz
          ls -lh ubuntu_18.04.tar.7z.*

      - name: Create Release and upload
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          name: "Ubuntu 18.04 Docker Image (${{ inputs.release_tag }})"
          body: |
            Ubuntu 18.04 Docker image split into 1023MB volumes.

            Restore with:
