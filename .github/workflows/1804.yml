name: Pull Docker Images and Upload to Release (Split)

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (leave empty for auto-generate)'
        required: false
        default: ''
      create_release:
        description: 'Create a GitHub Release and upload artifacts'
        required: true
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  pull-and-upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install 7-Zip
        run: sudo apt-get update && sudo apt-get install -y p7zip-full

      - name: Prepare directories
        run: mkdir -p images

      - name: Pull, save, split and upload images
        id: process_images
        run: |
          declare -A images=(
            ["ubuntu:18.04"]="ubuntu_18.04"
            ["catthehacker/ubuntu:act-18.04"]="catthehacker_ubuntu_act-18.04"
          )
          successful_tags=()
          for img in "${!images[@]}"; do
            echo "Attempting to pull $img ..."
            if docker pull "$img"; then
              echo "Pull successful for $img"
              base_name="${images[$img]}"
              tar_file="images/${base_name}.tar"
              echo "Saving to $tar_file ..."
              docker save "$img" -o "$tar_file"
              # 分卷压缩，每卷 1023MB (避免 GitHub 单文件 2GB 限制，同时适合 Release)
              echo "Splitting into 7z volumes (1023MB each)..."
              7z a -v1023m "images/${base_name}.7z" "$tar_file"
              # 删除原始 tar 文件以节省空间
              rm "$tar_file"
              successful_tags+=("$img")
            else
              echo "Pull failed for $img, skipping."
            fi
          done
          # 输出成功列表
          if [ ${#successful_tags[@]} -eq 0 ]; then
            echo "No images were successfully pulled. Exiting."
            exit 1
          fi
          echo "successful_images=${successful_tags[@]}" >> $GITHUB_OUTPUT

      - name: Prepare tag and release name
        id: release_info
        run: |
          TAG="${{ inputs.release_tag }}"
          if [ -z "$TAG" ]; then
            TAG="docker-images-$(date +'%Y%m%d-%H%M%S')"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "name=Docker Images ($TAG)" >> $GITHUB_OUTPUT

      - name: Create GitHub Release and upload split archives
        if: inputs.create_release == true
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_info.outputs.tag }}
          name: ${{ steps.release_info.outputs.name }}
          body: |
            This release contains Docker images successfully pulled from Docker Hub.

            **Images included:**
            ${{ steps.process_images.outputs.successful_images }}

            Each image is split into 7z volumes (1023MB each). To reassemble and load:

            ```bash
            # Download all parts of an image, then:
            7z x image.7z.001
            docker load < image.tar
